name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      # Optional: wire repository secrets here so generated tests can read real
      # credentials from process.env. Example pattern (rename per your app):
      #
      # APP_VERIFIED_EMAIL: ${{ secrets.APP_VERIFIED_EMAIL }}
      # APP_VERIFIED_PASSWORD: ${{ secrets.APP_VERIFIED_PASSWORD }}
      #
      # Required only if you want the in-UI Generate button to work in CI.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Generate Allure HTML report
        if: ${{ !cancelled() }}
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure HTML report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Upload AI-generated reports
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: ai-reports
          path: reports/
          retention-days: 30
